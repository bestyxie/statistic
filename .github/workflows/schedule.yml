name: Daily Import

on:
  schedule:
    # UTC 17:00 = 北京时间凌晨 1:00
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    name: Import yesterday data
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run import
        working-directory: packages/api
        env:
          API_BASE: https://statistic-api.gabbyxie714.workers.dev/api
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          SHOP_ID: ${{ secrets.SHOP_ID }}
        run: pnpm exec tsx src/scripts/import-by-visitors.ts
